<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Strategy Studio | Consultoría para hispanohablantes en Europa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .transition { transition: all 0.2s ease; }
        .tab-active { background-color: #4f46e5; color: white; }
        .tab-inactive { background-color: #e5e7eb; color: #374151; }
    </style>
</head>
<body class="bg-white text-gray-800">

    <!-- Navegación + Carrito -->
    <nav class="border-b border-gray-200 bg-white/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <img src="img/logo.png" alt="Logo" class="h-20 w-auto">
                
                <div class="hidden md:flex space-x-8">
                    <a href="#nosotros" class="text-gray-600 hover:text-indigo-600">Nosotros</a>
                    <a href="#metodologia" class="text-gray-600 hover:text-indigo-600">Metodología</a>
                    <a href="#servicios-precios" class="text-gray-600 hover:text-indigo-600">Servicios</a>
                    <a href="#precios" class="text-gray-600 hover:text-indigo-600">Precios</a>
                    <a href="#testimonios" class="text-gray-600 hover:text-indigo-600">Testimonios</a>
                    <a href="#faq" class="text-gray-600 hover:text-indigo-600">FAQ</a>
                </div>

                <div class="flex items-center gap-4">
                    <!-- Selector de idiomas -->
                    <button onclick="cambiarIdioma('es')" id="btn-es" class="px-3 py-1 rounded text-sm font-semibold bg-indigo-600 text-white">🇪🇸 ES</button>
                    <button onclick="cambiarIdioma('en')" id="btn-en" class="px-3 py-1 rounded text-sm font-semibold bg-gray-200 text-gray-700">🇬🇧 EN</button>
                    <button onclick="cambiarIdioma('pt')" id="btn-pt" class="px-3 py-1 rounded text-sm font-semibold bg-gray-200 text-gray-700">🇧🇷 PT</button>

                    <!-- Carrito -->
                    <button onclick="toggleCart()" class="relative flex items-center gap-2 text-xl hover:text-indigo-600 transition">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-pink-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Resto del contenido original (Hero, Nosotros, Metodología, etc.) se mantiene igual -->
    <!-- ... (el código que me enviaste se mantiene desde aquí hasta antes del script) ... -->

    <!-- PRECIOS (modificado con botones "Agregar al carrito") -->
    <section id="precios" class="py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 id="precios-titulo" class="text-3xl font-bold text-center text-gray-900 mb-4">Servicios y precios</h2>
            <p id="precios-sub" class="text-center text-gray-600 mb-8">Precios adaptados a cada mercado. Elige tu ubicación para ver las tarifas correctas.</p>

            <div class="flex justify-center gap-4 mb-12">
                <button onclick="cambiarPrecio('ie')" id="tab-ie" class="px-6 py-2 rounded-full font-semibold tab-active transition">Irlanda / UK</button>
                <button onclick="cambiarPrecio('es')" id="tab-es" class="px-6 py-2 rounded-full font-semibold tab-inactive transition">España</button>
                <button onclick="cambiarPrecio('latam')" id="tab-latam" class="px-6 py-2 rounded-full font-semibold tab-inactive transition">Latinoamérica</button>
            </div>

            <div id="precios-contenedor" class="space-y-8"></div>
        </div>
    </section>

    <!-- CARRITO DE COMPRA -->
    <div id="cart-sidebar" class="hidden fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl z-[100] overflow-y-auto border-l border-gray-200">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="text-2xl font-bold text-gray-900">Tu Carrito</h3>
            <button onclick="toggleCart()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
        </div>
        
        <div id="cart-items" class="p-6 space-y-6 min-h-[400px]">
            <!-- Items se agregan con JS -->
        </div>

        <div class="p-6 border-t">
            <div class="flex justify-between text-lg font-semibold mb-6">
                <span>Total:</span>
                <span id="cart-total" class="text-indigo-600">€0</span>
            </div>
            <button onclick="proceedToPayment()" 
                    class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold text-lg">
                Proceder al pago
            </button>
        </div>
    </div>

    <div id="cart-overlay" onclick="toggleCart()" class="hidden fixed inset-0 bg-black/50 z-[99]"></div>

    <!-- Resto del código original (Testimonios, FAQ, Footer, etc.) -->

    <script>
        // === TU CÓDIGO ORIGINAL DE TRADUCCIONES Y FUNCIONES (cambiarIdioma, cambiarPrecio, etc.) ===
        // ... (mantengo todo tu código de traducciones y lógica de precios) ...

        // ==================== CARRITO DE COMPRA ====================
        let cart = [];

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartCount();
            toggleCart(); // abre el carrito automáticamente
        }

        function updateCartCount() {
            document.getElementById('cart-count').textContent = cart.length;
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            sidebar.classList.toggle('hidden');
            overlay.classList.toggle('hidden');
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';

            if (cart.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 py-12">Tu carrito está vacío</p>`;
                document.getElementById('cart-total').textContent = '€0';
                return;
            }

            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl">
                        <div>
                            <p class="font-medium text-gray-900">${item.name}</p>
                            <p class="text-sm text-gray-500">€${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-500 hover:text-red-600">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            });

            document.getElementById('cart-total').textContent = `€${total}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartCount();
            renderCart();
        }

        function proceedToPayment() {
            if (cart.length === 0) return;

            let total = cart.reduce((sum, item) => sum + item.price, 0);
            let message = `Hola, quiero comprar los siguientes servicios:\n\n`;

            cart.forEach(item => {
                message += `- ${item.name} → €${item.price}\n`;
            });
            message += `\nTotal: €${total}\n\nQuiero agendar mi sesión. ¿Cuándo tienes disponibilidad?`;

            const whatsappNumber = "353876071392"; // ← Cambia si es necesario
            const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');

            // Limpiar carrito después de enviar
            setTimeout(() => {
                cart = [];
                updateCartCount();
                toggleCart();
            }, 1500);
        }

        // ==================== INICIALIZACIÓN ====================
        window.onload = function() {
            cambiarPrecio('ie');
            cambiarIdioma('es');
            updateCartCount();
        };
    </script>
</body>
</html>
