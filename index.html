<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Strategy Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-white text-gray-800">

    <!-- NAV -->
    <nav class="border-b border-gray-200 bg-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <img src="img/logo.png" alt="Logo" class="h-16">

            <div class="hidden md:flex gap-8 text-lg">
                <a href="#nosotros" class="hover:text-indigo-600">Nosotros</a>
                <a href="#metodologia" class="hover:text-indigo-600">Metodología</a>
                <a href="#servicios-precios" class="hover:text-indigo-600">Servicios</a>
                <a href="#precios" class="hover:text-indigo-600">Precios</a>
                <a href="#testimonios" class="hover:text-indigo-600">Testimonios</a>
                <a href="#faq" class="hover:text-indigo-600">FAQ</a>
            </div>

            <button onclick="toggleCart()" class="relative text-2xl hover:text-indigo-600">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-pink-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </button>
        </div>
    </nav>

    <!-- Hero -->
    <section class="max-w-7xl mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl font-bold mb-6">Tu carrera merece una estrategia clara</h1>
        <a href="#precios" class="bg-indigo-600 text-white px-8 py-4 rounded-lg text-lg font-semibold">Ver Precios</a>
    </section>

    <!-- PRECIOS -->
    <section id="precios" class="py-20 bg-gray-50">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-12">Servicios y Precios</h2>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="bg-white p-8 rounded-2xl shadow text-center">
                    <h3 class="text-2xl font-bold mb-2">Sesión Puntual</h3>
                    <p class="text-3xl font-bold text-indigo-600 mb-6">€75</p>
                    <button onclick="addToCart('Sesión Puntual', 75)" 
                            class="w-full bg-indigo-600 text-white py-4 rounded-xl font-medium">Agregar al carrito</button>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow border-2 border-indigo-600 text-center">
                    <h3 class="text-2xl font-bold mb-2">Programa Estrategia</h3>
                    <p class="text-3xl font-bold text-indigo-600 mb-6">€390</p>
                    <button onclick="addToCart('Programa Estrategia', 390)" 
                            class="w-full bg-indigo-600 text-white py-4 rounded-xl font-medium">Agregar al carrito</button>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow text-center">
                    <h3 class="text-2xl font-bold mb-2">Acompañamiento Total</h3>
                    <p class="text-3xl font-bold text-indigo-600 mb-6">€750</p>
                    <button onclick="addToCart('Acompañamiento Total', 750)" 
                            class="w-full bg-indigo-600 text-white py-4 rounded-xl font-medium">Agregar al carrito</button>
                </div>
            </div>
        </div>
    </section>

    <!-- CARRITO -->
    <div id="cart-sidebar" class="hidden fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl z-50 overflow-auto">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="text-2xl font-bold">Tu Carrito</h3>
            <button onclick="toggleCart()" class="text-3xl text-gray-400">×</button>
        </div>
        <div id="cart-items" class="p-6 space-y-4"></div>
        <div class="p-6 border-t">
            <div class="flex justify-between text-xl mb-6">
                <span>Total</span>
                <span id="cart-total" class="font-bold">€0</span>
            </div>
            <button onclick="proceedToPayment()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-semibold">
                Proceder al pago
            </button>
        </div>
    </div>

    <div id="cart-overlay" onclick="toggleCart()" class="hidden fixed inset-0 bg-black/60 z-40"></div>

    <script>
        let cart = [];

        function addToCart(name, price) {
            cart.push({ name, price });
            document.getElementById('cart-count').textContent = cart.length;
            toggleCart();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('hidden');
            document.getElementById('cart-overlay').classList.toggle('hidden');
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-12">Tu carrito está vacío</p>';
                document.getElementById('cart-total').textContent = '€0';
                return;
            }

            cart.forEach((item, i) => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex justify-between bg-gray-100 p-4 rounded-xl">
                        <div>
                            <p class="font-medium">${item.name}</p>
                            <p class="text-sm text-gray-500">€${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${i})" class="text-red-500">Eliminar</button>
                    </div>`;
            });
            document.getElementById('cart-total').textContent = `€${total}`;
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            document.getElementById('cart-count').textContent = cart.length;
            renderCart();
        }

        function proceedToPayment() {
            if (cart.length === 0) return;
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            let msg = `Hola, quiero comprar:\n\n`;
            cart.forEach(item => msg += `- ${item.name} → €${item.price}\n`);
            msg += `\nTotal: €${total}\n\nQuiero agendar mi sesión. ¿Cuándo tienes disponibilidad?`;

            window.open(`https://wa.me/353876071392?text=${encodeURIComponent(msg)}`, '_blank');

            setTimeout(() => {
                cart = [];
                document.getElementById('cart-count').textContent = '0';
                toggleCart();
            }, 1500);
        }

        // NAVEGACIÓN SUAVE
        document.querySelectorAll('a[href^="#"]').forEach(link => {
            link.addEventListener('click', function(e) {
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    e.preventDefault();
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        window.onload = () => {
            console.log("Página cargada correctamente");
            document.getElementById('cart-count').textContent = '0';
        };
    </script>
</body>
</html>
